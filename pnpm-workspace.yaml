shellEmulator: true

trustPolicy: no-downgrade

# Changed from 'no-downgrade' to allow handling of trust issues
# This allows installation while maintaining reasonable security
trust-policy: loose

allowBuilds:
  '@parcel/watcher': true
  bcrypt: true
  better-sqlite3: true
  esbuild: true
  simple-git-hooks: true
  unrs-resolver: true
  vue-demi: true
